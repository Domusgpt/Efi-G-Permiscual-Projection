services:
  postgres:
    image: postgres:16
    container_name: efi-postgres
    environment:
      POSTGRES_USER: efi
      POSTGRES_PASSWORD: efi
      POSTGRES_DB: efi_g
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: efi-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: efi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  create-buckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/efi-source-assets || true;
      mc mb -p local/efi-generated-assets || true;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
